<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake vs Pac-Men</title>
<style>
    body{
        margin:0;
        background:#050505;
        color:white;
        font-family:Arial, sans-serif;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        height:100vh;
    }

    h1{
        margin-bottom:10px;
    }

    #info{
        margin-bottom:10px;
        font-size:20px;
    }

    canvas{
        border:2px solid #444;
        background:#000;
    }

    #overlay{
        position:absolute;
        top:0;
        left:0;
        width:100%;
        height:100%;
        display:flex;
        justify-content:center;
        align-items:center;
        flex-direction:column;
        background:rgba(0,0,0,.75);
        color:white;
        font-size:28px;
    }

    button{
        margin-top:15px;
        padding:12px 24px;
        font-size:18px;
        border:none;
        border-radius:8px;
        cursor:pointer;
    }

    #startBtn{
        background:white;
        color:black;
    }

    #playAgain{
        display:none;
        background:#ff1493;
        color:white;
    }
</style>
</head>
<body>

<h1>Snake vs Pac-Men</h1>
<div id="info">Apples: <span id="score">0</span> / 30</div>

<canvas id="game" width="700" height="700"></canvas>

<div id="overlay">
    <div id="message">Press Start To Begin</div>
    <button id="startBtn">Start Game</button>
    <button id="playAgain">Play Again</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const overlay = document.getElementById("overlay");
const message = document.getElementById("message");
const startBtn = document.getElementById("startBtn");
const playAgainBtn = document.getElementById("playAgain");

const grid = 20;
const cols = canvas.width / grid;
const rows = canvas.height / grid;

let snake;
let direction;
let nextDirection;
let apple;
let cacti;
let pacmen;
let score;
let gameRunning;
let gameLoop;

function initGame() {
    snake = [
        {x:10,y:10},
        {x:9,y:10},
        {x:8,y:10}
    ];

    direction = {x:0,y:0}; // DOESN'T MOVE INITIALLY
    nextDirection = {x:0,y:0};

    score = 0;
    scoreEl.textContent = score;

    gameRunning = true;

    apple = randomEmptyCell();
    generateCacti();

    pacmen = [
        {x:30,y:30},
        {x:32,y:32}
    ];

    draw();
}

function randomEmptyCell() {
    while(true){
        let pos = {
            x: Math.floor(Math.random()*cols),
            y: Math.floor(Math.random()*rows)
        };

        let occupied = snake?.some(s=>s.x===pos.x && s.y===pos.y);

        if(!occupied) return pos;
    }
}

function generateCacti() {
    cacti = [];

    let count = Math.min(4 + score, 18);

    for(let i=0;i<count;i++){
        let valid = false;

        while(!valid){
            let c = {
                x: Math.floor(Math.random()*cols),
                y: Math.floor(Math.random()*rows)
            };

            valid =
                !snake.some(s=>s.x===c.x && s.y===c.y) &&
                !(apple.x===c.x && apple.y===c.y);

            if(valid){
                cacti.push(c);
            }
        }
    }
}

function drawSnake() {
    ctx.fillStyle="white";

    snake.forEach(seg=>{
        ctx.fillRect(seg.x*grid, seg.y*grid, grid-1, grid-1);
    });
}

function drawApple() {
    ctx.fillStyle="red";

    ctx.beginPath();
    ctx.arc(
        apple.x*grid+grid/2,
        apple.y*grid+grid/2,
        grid/2.5,
        0,
        Math.PI*2
    );
    ctx.fill();
}

function drawCacti() {
    ctx.fillStyle="#00cc44";

    cacti.forEach(c=>{
        ctx.fillRect(c.x*grid+4,c.y*grid,grid-8,grid);
        ctx.fillRect(c.x*grid,c.y*grid+5,6,10);
        ctx.fillRect(c.x*grid+grid-6,c.y*grid+5,6,10);
    });
}

function drawPacman(p) {
    ctx.fillStyle="#ff1493";

    ctx.beginPath();
    ctx.arc(
        p.x*grid+grid/2,
        p.y*grid+grid/2,
        grid/2.2,
        0.25*Math.PI,
        1.75*Math.PI
    );
    ctx.lineTo(p.x*grid+grid/2,p.y*grid+grid/2);
    ctx.fill();
}

function moveSnake() {

    if(direction.x===0 && direction.y===0) return;

    let head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
    };

    // WRAP WALLS INSTEAD OF DYING
    if(head.x < 0) head.x = cols-1;
    if(head.x >= cols) head.x = 0;
    if(head.y < 0) head.y = rows-1;
    if(head.y >= rows) head.y = 0;

    if(
        snake.some(seg=>seg.x===head.x && seg.y===head.y)
    ){
        gameOver();
        return;
    }

    if(
        cacti.some(c=>c.x===head.x && c.y===head.y)
    ){
        gameOver();
        return;
    }

    snake.unshift(head);

    if(head.x===apple.x && head.y===apple.y){

        score++;
        scoreEl.textContent = score;

        if(score >= 30){
            winGame();
            return;
        }

        apple = randomEmptyCell();
        generateCacti();
    }
    else{
        snake.pop();
    }
}

function movePacmen() {

    // Slower, imperfect AI
    pacmen.forEach((p,index)=>{

        // only move some turns
        if(Math.random() < 0.35) return;

        let dx = snake[0].x - p.x;
        let dy = snake[0].y - p.y;

        let moveX = 0;
        let moveY = 0;

        // randomness makes them less accurate
        if(Math.random() < 0.25){

            const dirs = [
                [1,0],
                [-1,0],
                [0,1],
                [0,-1]
            ];

            let d = dirs[Math.floor(Math.random()*4)];

            moveX = d[0];
            moveY = d[1];
        }
        else{
            if(Math.abs(dx) > Math.abs(dy)){
                moveX = Math.sign(dx);
            } else {
                moveY = Math.sign(dy);
            }
        }

        p.x += moveX;
        p.y += moveY;

        if(p.x<0) p.x=cols-1;
        if(p.x>=cols) p.x=0;
        if(p.y<0) p.y=rows-1;
        if(p.y>=rows) p.y=0;

        if(p.x===snake[0].x && p.y===snake[0].y){
            gameOver();
        }
    });
}

function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawApple();
    drawCacti();
    drawSnake();

    pacmen.forEach(drawPacman);
}

function update() {
    if(!gameRunning) return;

    direction = nextDirection;

    moveSnake();
    movePacmen();
    draw();
}

function gameOver() {
    gameRunning = false;

    message.textContent = `Game Over! Score: ${score}`;
    overlay.style.display="flex";
    playAgainBtn.style.display="inline-block";
    startBtn.style.display="none";
}

function winGame() {
    gameRunning = false;

    message.textContent = "🎉 You Win! 30 Apples Collected!";
    overlay.style.display="flex";
    playAgainBtn.style.display="inline-block";
    startBtn.style.display="none";
}

document.addEventListener("keydown", e=>{

    if(!gameRunning) return;

    switch(e.key){

        case "ArrowUp":
            if(direction.y!==1)
                nextDirection={x:0,y:-1};
            break;

        case "ArrowDown":
            if(direction.y!==-1)
                nextDirection={x:0,y:1};
            break;

        case "ArrowLeft":
            if(direction.x!==1)
                nextDirection={x:-1,y:0};
            break;

        case "ArrowRight":
            if(direction.x!==-1)
                nextDirection={x:1,y:0};
            break;
    }
});

startBtn.onclick = () => {
    overlay.style.display="none";
    initGame();

    clearInterval(gameLoop);

    // Slightly slower game
    gameLoop = setInterval(update, 140);
};

playAgainBtn.onclick = () => {
    overlay.style.display="none";
    playAgainBtn.style.display="none";
    startBtn.style.display="inline-block";

    message.textContent = "Press Start To Begin";

    initGame();

    clearInterval(gameLoop);
    gameLoop = setInterval(update, 140);

    overlay.style.display="none";
};

initGame();
draw();
</script>

</body>
</html>
